---
# Read-only security checks against a running sandbox container. Every task
# uses `raw` (no Python interpreter required on the target) since the images
# under test are arbitrary user containers that may not have Python at all.
#
# Each task name is prefixed with the catalog id (see src/lib/catalog) so the
# Node-side parser (src/lib/checks/ansibleRunner.ts) can map JSON callback
# output back to a specific check.
- hosts: all
  gather_facts: false
  tasks:
    - name: "C-01: runtime uid"
      ansible.builtin.raw: id -u
      register: c01_result
      changed_when: false

    - name: "U-16: /etc/passwd owner and mode"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/passwd ]; then stat -c "%U:%G %a" /etc/passwd; else echo __MISSING__; fi'
      register: u16_result
      changed_when: false

    - name: "C-03: listening ports"
      ansible.builtin.raw: >-
        sh -c 'if command -v ss >/dev/null 2>&1; then ss -tln;
        elif command -v netstat >/dev/null 2>&1; then netstat -tln;
        else echo __MISSING__; fi'
      register: c03_result
      changed_when: false

    - name: "C-05: dangerous packages present"
      ansible.builtin.raw: >-
        sh -c 'for c in curl wget gcc cc make apt apt-get; do
        command -v "$c" >/dev/null 2>&1 && echo "$c"; done; true'
      register: c05_result
      changed_when: false

    - name: "C-06: setuid setgid binaries"
      # find exits non-zero when it hits any permission-denied subtree while
      # walking /, which would otherwise abort the rest of the play — force
      # success since 2>/dev/null already discards the noise we don't care about.
      ansible.builtin.raw: >-
        sh -c 'find / -xdev \( -perm -4000 -o -perm -2000 \) -type f 2>/dev/null; true'
      register: c06_result
      changed_when: false

    - name: "C-07: root filesystem writability"
      # Read the actual mount options for "/" from /proc/mounts instead of a
      # touch-test — touch-testing a path the running (often non-root) user
      # doesn't own would report "readonly" even when the mount itself is rw.
      ansible.builtin.raw: >-
        sh -c 'grep " / " /proc/mounts 2>/dev/null | head -1; true'
      register: c07_result
      changed_when: false

    # U-01..U-13 (KISA guide, account management): every task below only
    # extracts raw evidence (file existence + relevant lines); all pass/fail
    # interpretation happens in ruleEvaluation.ts. Every task ends with
    # `; true` because `grep` with no match exits 1, which would otherwise
    # abort the rest of the play for that host (see C-06 fix above).
    - name: "U-01: sshd PermitRootLogin setting"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/ssh/sshd_config ]; then grep -i PermitRootLogin /etc/ssh/sshd_config;
        else echo __MISSING__; fi; true'
      register: u01_result
      changed_when: false

    - name: "U-02: login.defs password aging policy"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/login.defs ]; then grep -E "PASS_MAX_DAYS|PASS_MIN_LEN" /etc/login.defs;
        else echo __MISSING__; fi; true'
      register: u02_result
      changed_when: false

    - name: "U-03: account lockout PAM module"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/pam.d/common-auth ]; then cat /etc/pam.d/common-auth;
        elif [ -e /etc/pam.d/system-auth ]; then cat /etc/pam.d/system-auth;
        else echo __MISSING__; fi; true'
      register: u03_result
      changed_when: false

    - name: "U-04: passwd password field protection"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/passwd ]; then cut -d: -f2 /etc/passwd;
        else echo __MISSING__; fi; true'
      register: u04_result
      changed_when: false

    - name: "U-05: accounts with UID 0"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/passwd ]; then cut -d: -f1,3 /etc/passwd;
        else echo __MISSING__; fi; true'
      register: u05_result
      changed_when: false

    - name: "U-06: su restricted via pam_wheel"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/pam.d/su ]; then cat /etc/pam.d/su;
        else echo __MISSING__; fi; true'
      register: u06_result
      changed_when: false

    - name: "U-07: unnecessary default accounts"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/passwd ]; then cut -d: -f1 /etc/passwd;
        else echo __MISSING__; fi; true'
      register: u07_result
      changed_when: false

    - name: "U-08: admin group membership"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/group ]; then grep -E "^(root|wheel|sudo):" /etc/group;
        else echo __MISSING__; fi; true'
      register: u08_result
      changed_when: false

    - name: "U-09: passwd GIDs missing from group file"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/passwd ] && [ -e /etc/group ]; then
        echo __PASSWD__; cut -d: -f4 /etc/passwd; echo __GROUP__; cut -d: -f3 /etc/group;
        else echo __MISSING__; fi; true'
      register: u09_result
      changed_when: false

    - name: "U-10: duplicate UIDs"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/passwd ]; then cut -d: -f3 /etc/passwd;
        else echo __MISSING__; fi; true'
      register: u10_result
      changed_when: false

    - name: "U-11: system account shells"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/passwd ]; then cut -d: -f1,3,7 /etc/passwd;
        else echo __MISSING__; fi; true'
      register: u11_result
      changed_when: false

    - name: "U-12: shell session TMOUT"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/profile ]; then grep -i TMOUT /etc/profile;
        else echo __MISSING__; fi; true'
      register: u12_result
      changed_when: false

    - name: "U-13: password hashing algorithm"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/login.defs ]; then grep -i ENCRYPT_METHOD /etc/login.defs;
        else echo __MISSING__; fi; true'
      register: u13_result
      changed_when: false

    # U-14..U-33 (KISA guide, file and directory management, #44). U-16 is
    # already implemented above. Same idioms as U-01..U-13: existence-guarded
    # `if [ -e/-d ... ]` + `echo __MISSING__`, and a trailing `; true` on any
    # task whose command (grep/find with no match) can exit non-zero.
    - name: "U-14: root PATH and home directory permissions"
      ansible.builtin.raw: >-
        sh -c 'if [ -d /root ]; then stat -c "%U:%G %a" /root;
        grep -h "^[^#]*PATH=" /root/.bash_profile /root/.bashrc /root/.profile /etc/profile 2>/dev/null;
        else echo __MISSING__; fi; true'
      register: u14_result
      changed_when: false

    - name: "U-15: files and directories without a valid owner"
      # find exits non-zero on permission-denied subtrees while walking / —
      # force success since 2>/dev/null already discards that noise.
      ansible.builtin.raw: >-
        sh -c 'find / -xdev \( -nouser -o -nogroup \) 2>/dev/null; true'
      register: u15_result
      changed_when: false

    - name: "U-17: system startup script permissions"
      ansible.builtin.raw: >-
        sh -c 'if [ -d /etc/init.d ]; then
        find /etc/init.d -maxdepth 1 -type f \( -perm -022 -o ! -user root \) 2>/dev/null;
        else echo __MISSING__; fi; true'
      register: u17_result
      changed_when: false

    - name: "U-18: /etc/shadow owner and mode"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/shadow ]; then stat -c "%U:%G %a" /etc/shadow;
        else echo __MISSING__; fi'
      register: u18_result
      changed_when: false

    - name: "U-19: /etc/hosts owner and mode"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/hosts ]; then stat -c "%U:%G %a" /etc/hosts;
        else echo __MISSING__; fi'
      register: u19_result
      changed_when: false

    - name: "U-20: (x)inetd.conf owner and mode"
      ansible.builtin.raw: >-
        sh -c 'found=0; for f in /etc/inetd.conf /etc/xinetd.conf; do
        if [ -e "$f" ]; then stat -c "%n %U:%G %a" "$f"; found=1; fi; done;
        [ "$found" -eq 0 ] && echo __MISSING__; true'
      register: u20_result
      changed_when: false

    - name: "U-21: (r)syslog.conf owner and mode"
      ansible.builtin.raw: >-
        sh -c 'found=0; for f in /etc/syslog.conf /etc/rsyslog.conf; do
        if [ -e "$f" ]; then stat -c "%n %U:%G %a" "$f"; found=1; fi; done;
        [ "$found" -eq 0 ] && echo __MISSING__; true'
      register: u21_result
      changed_when: false

    - name: "U-22: /etc/services owner and mode"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/services ]; then stat -c "%U:%G %a" /etc/services;
        else echo __MISSING__; fi'
      register: u22_result
      changed_when: false

    - name: "U-23: setuid setgid sticky-bit files in world-writable dirs"
      # Distinct from C-06 (unexpected setuid/setgid anywhere on the
      # filesystem): this scopes to the classic KISA U-23 concern of
      # attacker-plantable binaries in shared, world-writable staging
      # directories (/tmp, /var/tmp, /dev/shm), which is a narrower and
      # higher-signal subset than a full filesystem sweep.
      ansible.builtin.raw: >-
        sh -c 'dirs=""; for d in /tmp /var/tmp /dev/shm; do [ -d "$d" ] && dirs="$dirs $d"; done;
        if [ -z "$dirs" ]; then echo __MISSING__;
        else find $dirs -xdev \( -perm -4000 -o -perm -2000 -o -perm -1000 \) -type f 2>/dev/null; fi; true'
      register: u23_result
      changed_when: false

    - name: "U-24: environment variable file owner and mode"
      ansible.builtin.raw: >-
        sh -c 'found=0; for f in /etc/profile /etc/bashrc /etc/bash.bashrc; do
        if [ -e "$f" ]; then stat -c "%n %U:%G %a" "$f"; found=1; fi; done;
        [ "$found" -eq 0 ] && echo __MISSING__; true'
      register: u24_result
      changed_when: false

    - name: "U-25: world writable files"
      ansible.builtin.raw: >-
        sh -c 'find / -xdev -perm -0002 -type f 2>/dev/null; true'
      register: u25_result
      changed_when: false

    - name: "U-26: irregular files under /dev"
      # /dev should only ever contain device special files, symlinks, sockets,
      # FIFOs and directories — a plain regular file there is out of place
      # (e.g. leftover/forged device entries) and worth flagging.
      ansible.builtin.raw: >-
        sh -c 'if [ -d /dev ]; then find /dev -xdev -type f 2>/dev/null;
        else echo __MISSING__; fi; true'
      register: u26_result
      changed_when: false

    - name: "U-27: .rhosts and hosts.equiv usage"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/hosts.equiv ]; then echo __EQUIV_START__; cat /etc/hosts.equiv; echo __EQUIV_END__; fi;
        find /root /home -maxdepth 2 -name ".rhosts" 2>/dev/null; true'
      register: u27_result
      changed_when: false

    - name: "U-28: connection IP and port restriction"
      ansible.builtin.raw: >-
        sh -c 'found=0;
        if [ -e /etc/hosts.allow ]; then echo __ALLOW_START__; cat /etc/hosts.allow; echo __ALLOW_END__; found=1; fi;
        if [ -e /etc/hosts.deny ]; then echo __DENY_START__; cat /etc/hosts.deny; echo __DENY_END__; found=1; fi;
        if command -v iptables >/dev/null 2>&1; then echo __IPTABLES_START__; iptables -L -n 2>/dev/null; echo __IPTABLES_END__; found=1; fi;
        [ "$found" -eq 0 ] && echo __MISSING__; true'
      register: u28_result
      changed_when: false

    - name: "U-29: hosts.lpd owner and mode"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/hosts.lpd ]; then stat -c "%U:%G %a" /etc/hosts.lpd;
        else echo __MISSING__; fi'
      register: u29_result
      changed_when: false

    - name: "U-30: UMASK setting"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/profile ] || [ -e /etc/login.defs ] || [ -e /etc/bashrc ]; then
        grep -h -i "umask" /etc/profile /etc/login.defs /etc/bashrc 2>/dev/null;
        else echo __MISSING__; fi; true'
      register: u30_result
      changed_when: false

    - name: "U-31: home directory owner and mode"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/passwd ]; then
        while IFS=: read -r name pass uid gid gecos home shell; do
        if [ -d "$home" ]; then echo "$name:$shell:$(stat -c "%U %a" "$home")"; fi;
        done < /etc/passwd; else echo __MISSING__; fi; true'
      register: u31_result
      changed_when: false

    - name: "U-32: assigned home directory existence"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/passwd ]; then
        while IFS=: read -r name pass uid gid gecos home shell; do
        if [ -n "$home" ] && [ ! -d "$home" ]; then echo "$name:$uid:$home:$shell"; fi;
        done < /etc/passwd; else echo __MISSING__; fi; true'
      register: u32_result
      changed_when: false

    - name: "U-33: hidden files and directories"
      ansible.builtin.raw: >-
        sh -c 'find /tmp /var/tmp /root /home -xdev -maxdepth 3 -name ".*" ! -name "." ! -name ".." 2>/dev/null; true'
      register: u33_result
      changed_when: false

    # U-34..U-67 (KISA guide, service/patch/log management, #46). Same idioms
    # as U-01..U-33: existence/binary-guarded checks, `echo __MISSING__` for
    # "nothing to evaluate", trailing `; true` on any command that can exit
    # non-zero (grep/find with no match). Most of U-34..U-61 ask "is this
    # legacy/unnecessary service installed at all" -- on a minimal container
    # image the correct, expected outcome is overwhelmingly "skip" (the
    # service was never installed), not a false "pass" or "fail". Several
    # items share detection/config-dump helper tasks (mirroring the
    # nginx-detection idiom from #47) so the many U-53..U-61 FTP/SNMP items
    # don't each re-implement "is FTP/SNMP even present" from scratch.
    - name: "U-34: finger service presence"
      ansible.builtin.raw: >-
        sh -c 'for c in fingerd in.fingerd; do command -v "$c" >/dev/null 2>&1 && echo "BIN:$c"; done;
        if [ -d /etc/xinetd.d ]; then for f in finger; do [ -e "/etc/xinetd.d/$f" ] && echo "CONF:$f"; done; fi;
        if [ -e /etc/inetd.conf ]; then grep -i "^finger" /etc/inetd.conf 2>/dev/null | sed "s/^/CONF:/"; fi; true'
      register: u34_result
      changed_when: false

    - name: "U-35: shared service anonymous access"
      # "공유 서비스" here covers the classic KISA anonymous-access surfaces:
      # Samba guest access and NFS's no_root_squash/insecure export options.
      ansible.builtin.raw: >-
        sh -c 'found=0;
        if [ -e /etc/samba/smb.conf ]; then found=1; grep -iE "guest ok|map to guest" /etc/samba/smb.conf 2>/dev/null | sed "s/^/SMB:/"; fi;
        if [ -e /etc/exports ]; then found=1; grep -E "no_root_squash|insecure" /etc/exports 2>/dev/null | sed "s/^/NFS:/"; fi;
        [ "$found" -eq 0 ] && echo __MISSING__; true'
      register: u35_result
      changed_when: false

    - name: "U-36: r-series services (rsh/rlogin/rexec)"
      ansible.builtin.raw: >-
        sh -c 'for c in rshd rlogind rexecd in.rshd in.rlogind in.rexecd; do command -v "$c" >/dev/null 2>&1 && echo "BIN:$c"; done;
        if [ -d /etc/xinetd.d ]; then for f in shell login exec rsh rlogin rexec; do [ -e "/etc/xinetd.d/$f" ] && echo "CONF:$f"; done; fi;
        if [ -e /etc/inetd.conf ]; then grep -iE "^(shell|login|exec)\b" /etc/inetd.conf 2>/dev/null | sed "s/^/CONF:/"; fi; true'
      register: u36_result
      changed_when: false

    - name: "U-37: crontab configuration file permissions"
      ansible.builtin.raw: >-
        sh -c 'found=0;
        if [ -e /etc/crontab ]; then stat -c "FILE /etc/crontab %U:%G %a" /etc/crontab; found=1; fi;
        if [ -d /etc/cron.d ]; then stat -c "FILE /etc/cron.d %U:%G %a" /etc/cron.d; found=1; fi;
        if [ -d /var/spool/cron ]; then stat -c "FILE /var/spool/cron %U:%G %a" /var/spool/cron; found=1; fi;
        if [ -d /var/spool/cron/crontabs ]; then stat -c "FILE /var/spool/cron/crontabs %U:%G %a" /var/spool/cron/crontabs; found=1; fi;
        [ "$found" -eq 0 ] && echo __MISSING__; true'
      register: u37_result
      changed_when: false

    - name: "U-38: DoS-prone inetd services (echo/discard/daytime/chargen)"
      ansible.builtin.raw: >-
        sh -c 'found=0;
        if [ -d /etc/xinetd.d ]; then for f in echo echo-udp discard discard-udp daytime daytime-udp chargen chargen-udp; do
        if [ -e "/etc/xinetd.d/$f" ]; then found=1;
        if grep -qiE "^[[:space:]]*disable[[:space:]]*=[[:space:]]*no" "/etc/xinetd.d/$f" 2>/dev/null; then echo "ACTIVE:$f"; else echo "PRESENT:$f"; fi; fi; done; fi;
        if [ -e /etc/inetd.conf ]; then found=1; grep -iE "^(echo|discard|daytime|chargen)\b" /etc/inetd.conf 2>/dev/null | sed "s/^/ACTIVE:/"; fi;
        [ "$found" -eq 0 ] && echo __MISSING__; true'
      register: u38_result
      changed_when: false

    - name: "U-39: unnecessary NFS service"
      ansible.builtin.raw: >-
        sh -c 'for c in rpc.nfsd nfsd rpc.mountd; do command -v "$c" >/dev/null 2>&1 && echo "BIN:$c"; done;
        for f in nfs nfs-server nfs-kernel-server; do [ -e "/etc/init.d/$f" ] && echo "SVC:$f"; done; true'
      register: u39_result
      changed_when: false

    - name: "U-40: NFS export access control"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/exports ]; then cat /etc/exports; else echo __MISSING__; fi; true'
      register: u40_result
      changed_when: false

    - name: "U-41: unnecessary automountd"
      ansible.builtin.raw: >-
        sh -c 'for c in automount autofs; do command -v "$c" >/dev/null 2>&1 && echo "BIN:$c"; done;
        [ -e /etc/init.d/autofs ] && echo "SVC:autofs"; true'
      register: u41_result
      changed_when: false

    - name: "U-42: unnecessary RPC services"
      ansible.builtin.raw: >-
        sh -c 'for c in rpcbind portmap rpc.statd rpc.lockd; do command -v "$c" >/dev/null 2>&1 && echo "BIN:$c"; done; true'
      register: u42_result
      changed_when: false

    - name: "U-43: NIS/NIS+ service"
      ansible.builtin.raw: >-
        sh -c 'for c in ypserv ypbind ypxfrd rpc.yppasswdd ypcat ypmatch; do command -v "$c" >/dev/null 2>&1 && echo "BIN:$c"; done;
        [ -e /etc/yp.conf ] && echo "CONF:yp.conf"; true'
      register: u43_result
      changed_when: false

    - name: "U-44: tftp/talk services"
      ansible.builtin.raw: >-
        sh -c 'for c in tftpd in.tftpd talkd in.talkd ntalkd; do command -v "$c" >/dev/null 2>&1 && echo "BIN:$c"; done;
        if [ -d /etc/xinetd.d ]; then for f in tftp talk ntalk; do [ -e "/etc/xinetd.d/$f" ] && echo "CONF:$f"; done; fi;
        if [ -e /etc/inetd.conf ]; then grep -iE "^(tftp|talk|ntalk)\b" /etc/inetd.conf 2>/dev/null | sed "s/^/CONF:/"; fi; true'
      register: u44_result
      changed_when: false

    - name: "mail service detection (internal)"
      ansible.builtin.raw: >-
        sh -c 'if command -v postconf >/dev/null 2>&1; then echo postfix;
        elif command -v sendmail >/dev/null 2>&1; then echo sendmail;
        elif command -v exim >/dev/null 2>&1 || command -v exim4 >/dev/null 2>&1; then echo exim;
        else echo absent; fi; true'
      register: mail_detect_result
      changed_when: false

    - name: "U-45: mail service version"
      ansible.builtin.raw: >-
        sh -c 'if command -v postconf >/dev/null 2>&1; then echo "postfix $(postconf -d mail_version 2>/dev/null)";
        elif command -v sendmail >/dev/null 2>&1; then sendmail -d0.1 -bt </dev/null 2>/dev/null | grep -i version;
        elif command -v exim >/dev/null 2>&1; then exim -bV 2>/dev/null | head -1;
        else echo __MISSING__; fi; true'
      register: u45_result
      changed_when: false

    - name: "U-46: mail queue access restriction"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/mail/sendmail.cf ]; then grep -i "^O PrivacyOptions" /etc/mail/sendmail.cf; fi; true'
      register: u46_result
      changed_when: false

    - name: "U-47: mail relay restriction"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/postfix/main.cf ]; then grep -E "^(mynetworks|smtpd_relay_restrictions|smtpd_recipient_restrictions)" /etc/postfix/main.cf;
        elif [ -e /etc/mail/access ]; then cat /etc/mail/access; fi; true'
      register: u47_result
      changed_when: false

    - name: "U-48: SMTP EXPN/VRFY command restriction"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/postfix/main.cf ]; then grep -E "^disable_vrfy_command" /etc/postfix/main.cf;
        elif [ -e /etc/mail/sendmail.cf ]; then grep -i "^O PrivacyOptions" /etc/mail/sendmail.cf; fi; true'
      register: u48_result
      changed_when: false

    - name: "dns service detection (internal)"
      ansible.builtin.raw: >-
        sh -c 'if command -v named >/dev/null 2>&1; then echo present; else echo absent; fi; true'
      register: dns_detect_result
      changed_when: false

    - name: "dns effective config (internal)"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/bind/named.conf.options ]; then cat /etc/bind/named.conf.options;
        elif [ -e /etc/named.conf ]; then cat /etc/named.conf;
        else echo __MISSING__; fi; true'
      register: dns_config_result
      changed_when: false

    - name: "U-49: DNS service version"
      ansible.builtin.raw: >-
        sh -c 'if command -v named >/dev/null 2>&1; then named -v 2>&1; else echo __MISSING__; fi; true'
      register: u49_result
      changed_when: false

    - name: "U-52: telnet service"
      ansible.builtin.raw: >-
        sh -c 'for c in telnetd in.telnetd; do command -v "$c" >/dev/null 2>&1 && echo "BIN:$c"; done;
        if [ -e /etc/xinetd.d/telnet ]; then echo "CONF:telnet"; fi;
        if [ -e /etc/inetd.conf ]; then grep -i "^telnet" /etc/inetd.conf 2>/dev/null | sed "s/^/CONF:/"; fi; true'
      register: u52_result
      changed_when: false

    - name: "ftp service detection (internal)"
      ansible.builtin.raw: >-
        sh -c 'if command -v vsftpd >/dev/null 2>&1; then echo vsftpd;
        elif command -v proftpd >/dev/null 2>&1; then echo proftpd;
        elif command -v pure-ftpd >/dev/null 2>&1; then echo pure-ftpd;
        else echo absent; fi; true'
      register: ftp_detect_result
      changed_when: false

    - name: "ftp effective config (internal)"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/vsftpd.conf ]; then cat /etc/vsftpd.conf;
        elif [ -e /etc/vsftpd/vsftpd.conf ]; then cat /etc/vsftpd/vsftpd.conf;
        elif [ -e /etc/proftpd/proftpd.conf ]; then cat /etc/proftpd/proftpd.conf;
        else echo __MISSING__; fi; true'
      register: ftp_config_result
      changed_when: false

    - name: "U-55: FTP account shell restriction"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/passwd ]; then grep -E "^ftp:" /etc/passwd; else echo __MISSING__; fi; true'
      register: u55_result
      changed_when: false

    - name: "U-57: ftpusers file configuration"
      ansible.builtin.raw: >-
        sh -c 'found=0;
        for f in /etc/ftpusers /etc/vsftpd/ftpusers /etc/vsftpd.ftpusers /etc/vsftpd/user_list; do
        if [ -e "$f" ]; then found=1; echo "FILE:$f"; cat "$f"; fi; done;
        [ "$found" -eq 0 ] && echo __MISSING__; true'
      register: u57_result
      changed_when: false

    - name: "snmp service detection (internal)"
      ansible.builtin.raw: >-
        sh -c 'if command -v snmpd >/dev/null 2>&1 || [ -e /etc/snmp/snmpd.conf ]; then echo present; else echo absent; fi; true'
      register: snmp_detect_result
      changed_when: false

    - name: "snmp effective config (internal)"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/snmp/snmpd.conf ]; then cat /etc/snmp/snmpd.conf; else echo __MISSING__; fi; true'
      register: snmp_config_result
      changed_when: false

    - name: "U-62: login warning banner"
      ansible.builtin.raw: >-
        sh -c 'echo __ISSUE_NET__; cat /etc/issue.net 2>/dev/null; echo __ISSUE__; cat /etc/issue 2>/dev/null; true'
      register: u62_result
      changed_when: false

    - name: "U-63: sudo command access management"
      ansible.builtin.raw: >-
        sh -c 'if [ -e /etc/sudoers ]; then cat /etc/sudoers; else echo __MISSING__; fi; true'
      register: u63_result
      changed_when: false

    - name: "U-64: periodic security patch application"
      ansible.builtin.raw: >-
        sh -c 'if command -v apt-get >/dev/null 2>&1 || command -v dpkg >/dev/null 2>&1; then echo "PKG:apt/dpkg";
        elif command -v yum >/dev/null 2>&1 || command -v rpm >/dev/null 2>&1; then echo "PKG:yum/rpm";
        elif command -v apk >/dev/null 2>&1; then echo "PKG:apk";
        else echo "PKG:unknown"; fi; true'
      register: u64_result
      changed_when: false

    - name: "U-65: NTP and time synchronization"
      ansible.builtin.raw: >-
        sh -c 'if command -v chronyd >/dev/null 2>&1 || [ -e /etc/chrony.conf ] || [ -e /etc/chrony/chrony.conf ]; then
        echo __CHRONY__; cat /etc/chrony.conf /etc/chrony/chrony.conf 2>/dev/null;
        elif command -v ntpd >/dev/null 2>&1 || [ -e /etc/ntp.conf ]; then
        echo __NTPD__; cat /etc/ntp.conf 2>/dev/null;
        elif [ -e /etc/systemd/timesyncd.conf ]; then
        echo __TIMESYNCD__; cat /etc/systemd/timesyncd.conf;
        else echo __MISSING__; fi; true'
      register: u65_result
      changed_when: false

    - name: "U-66: system logging policy"
      ansible.builtin.raw: >-
        sh -c 'found=0;
        if [ -e /etc/rsyslog.conf ]; then found=1; cat /etc/rsyslog.conf; fi;
        if [ -e /etc/syslog.conf ]; then found=1; cat /etc/syslog.conf; fi;
        if [ -d /etc/rsyslog.d ]; then found=1; cat /etc/rsyslog.d/*.conf 2>/dev/null; fi;
        [ "$found" -eq 0 ] && echo __MISSING__; true'
      register: u66_result
      changed_when: false

    - name: "U-67: log directory ownership and permissions"
      ansible.builtin.raw: >-
        sh -c 'if [ -d /var/log ]; then stat -c "%U:%G %a" /var/log; else echo __MISSING__; fi'
      register: u67_result
      changed_when: false

    # WEB-01..WEB-26 (KISA 주요정보통신기반시설 기술적 취약점 분석·평가 상세
    # 가이드, 웹 서비스 — see "web 점검 컴플라이언스.MD"): nginx-only for MVP
    # scope. The three tasks below are internal helpers, not tied to a single
    # catalog id -- they're matched by exact task name (not the `<id>:`
    # prefix convention) in ruleEvaluation.ts. When nginx isn't present,
    # every real WEB item evaluates to "skip".
    - name: "nginx detection (internal)"
      ansible.builtin.raw: >-
        sh -c 'if command -v nginx >/dev/null 2>&1 && [ -e /etc/nginx/nginx.conf ]; then echo present;
        else echo absent; fi; true'
      register: nginx_detect_result
      changed_when: false

    - name: "nginx effective config (internal)"
      # `nginx -T` prints the fully-resolved config (nginx.conf plus every
      # included file) in one shot -- far simpler than walking `include`
      # directives ourselves to reconstruct the effective config.
      ansible.builtin.raw: >-
        sh -c 'if command -v nginx >/dev/null 2>&1; then nginx -T 2>&1; else echo __MISSING__; fi; true'
      register: nginx_config_result
      changed_when: false

    - name: "nginx version (internal)"
      ansible.builtin.raw: >-
        sh -c 'if command -v nginx >/dev/null 2>&1; then nginx -v 2>&1; else echo __MISSING__; fi; true'
      register: nginx_version_result
      changed_when: false

    - name: "WEB-03: nginx basic auth password file permissions"
      # The password file's path is dynamic (whatever auth_basic_user_file
      # points at), so it has to be extracted from the effective config and
      # stat'd in the same step -- a static task can't know the path ahead
      # of time the way the fixed-path checks elsewhere in this file do.
      ansible.builtin.raw: >-
        sh -c 'if command -v nginx >/dev/null 2>&1; then
        LINE=$(nginx -T 2>/dev/null | grep -m1 "auth_basic_user_file");
        F=$(echo "$LINE" | tr -s " " | cut -d" " -f2 | tr -d ";");
        if [ -n "$F" ] && [ -e "$F" ]; then stat -c "%U:%G %a" "$F"; else echo __MISSING__; fi;
        else echo __MISSING__; fi; true'
      register: web03_result
      changed_when: false

    - name: "WEB-26: nginx log directory permissions"
      ansible.builtin.raw: >-
        sh -c 'if [ -d /var/log/nginx ]; then stat -c "%U:%G %a" /var/log/nginx;
        else echo __MISSING__; fi; true'
      register: web26_result
      changed_when: false

    - name: "nginx document root scan (internal)"
      # Shared by WEB-07 (leftover install/sample files) and WEB-14
      # (world-writable files) -- both need filesystem access under whatever
      # `root`/`alias` directives the config declares, which (like WEB-03's
      # password file) is a dynamic path only known after parsing the
      # effective config, so both scans happen in one combined task.
      # Output lines are prefixed LEFTOVER:/WRITABLE: so the two evaluators
      # can each filter out their half.
      ansible.builtin.raw: >-
        sh -c 'if command -v nginx >/dev/null 2>&1; then
        ROOTS=$(nginx -T 2>/dev/null | grep -E "^[[:space:]]*(root|alias)[[:space:]]" | awk "{print \$2}" | tr -d ";" | sort -u);
        if [ -z "$ROOTS" ]; then echo __MISSING__;
        else
        for r in $ROOTS; do
        if [ -d "$r" ]; then
        find "$r" -maxdepth 3 \( -iname "phpinfo.php" -o -iname "install.php" -o -iname "readme*" -o -iname "changelog*" -o -iname "license*" -o -iname ".git" -o -iname ".svn" -o -iname ".env" \) 2>/dev/null | sed "s/^/LEFTOVER:/";
        find "$r" -maxdepth 5 -type f -perm -0002 2>/dev/null | sed "s/^/WRITABLE:/";
        fi;
        done;
        fi;
        else echo __MISSING__; fi; true'
      register: web_docroot_scan_result
      changed_when: false
