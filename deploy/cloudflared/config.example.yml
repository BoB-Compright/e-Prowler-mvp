# NH-Guardian PM 공유 전용 Cloudflare Tunnel ingress 설정 (예시)
#
# 보안 원칙: 앱 전체가 아니라 PM 공유 화면이 동작하는 데 필요한 경로만
# 인터넷에 노출한다. 로그인·대시보드·자산·점검 API 등 내부 기능은
# 어떤 경로로도 터널을 통과하지 못한다(마지막 catch-all이 404 반환).
#
# 사용법: 이 파일을 ~/.cloudflared/config.yml 로 복사한 뒤
# <TUNNEL_ID>와 share.example.com 을 실제 값으로 바꾼다.
# 상세 절차는 docs/ops/share-tunnel.md 참고.

tunnel: <TUNNEL_ID>
credentials-file: ~/.cloudflared/<TUNNEL_ID>.json

ingress:
  # PM 공유 화면 (비밀번호 게이트 + 읽기 전용 리포트)
  - hostname: share.example.com
    path: ^/share($|/.*)
    service: http://localhost:3000
  # 공유 비밀번호 검증 API (5회 실패 잠금은 앱이 처리)
  - hostname: share.example.com
    path: ^/api/share($|/.*)
    service: http://localhost:3000
  # 페이지 렌더링에 필요한 정적 자산(JS/CSS/폰트)
  - hostname: share.example.com
    path: ^/_next/static/.*
    service: http://localhost:3000
  - hostname: share.example.com
    path: ^/favicon\.ico$
    service: http://localhost:3000
  # 그 외 전부 차단 — 로그인/대시보드/내부 API는 인터넷에서 접근 불가
  - service: http_status:404
